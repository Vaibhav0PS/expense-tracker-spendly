{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update your expense details</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" placeholder="0.00"
                           step="0.01" min="0.01"
                           value="{{ expense.amount }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="">Select a category</option>
                        <option value="Food" {% if expense.category == 'Food' %}selected{% endif %}>Food</option>
                        <option value="Transport" {% if expense.category == 'Transport' %}selected{% endif %}>Transport</option>
                        <option value="Bills" {% if expense.category == 'Bills' %}selected{% endif %}>Bills</option>
                        <option value="Health" {% if expense.category == 'Health' %}selected{% endif %}>Health</option>
                        <option value="Entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                        <option value="Shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                        <option value="Other" {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense.date }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <input type="text" id="description" name="description"
                           class="form-input" placeholder="What was this for?"
                           maxlength="200"
                           value="{{ expense.description or '' }}">
                </div>
                <button type="submit" class="btn-submit">Update expense</button>
            </form>

            <p class="auth-switch" style="margin-top: 1rem;">
                <a href="{{ url_for('profile') }}">Cancel and go back</a>
            </p>
        </div>

    </div>
</section>

{% endblock %}
